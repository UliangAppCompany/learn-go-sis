version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/query.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
