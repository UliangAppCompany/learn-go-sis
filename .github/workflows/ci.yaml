name: CI 

on: 
  push: 
    branches: [main]
  pull_request: 

jobs:
  build-test:
    runs-on: ubuntu-latest 
    defaults:
      run:
        working-directory: . 
    steps: 
      - uses: actions/checkout@v4 
      
      - uses: actions/setup-go@v5 
        with: 
          go-version: '1.26'
          cache-dependency-path: ./go.sum 

      - name: Check formatting 
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run gofmt -w ."; exit 1; }

      - name: Vet 
        run: go vet ./...

      - name: Test (race detector + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build 
        run: go build ./... 

  sqlc-drift: 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4 
      - uses: sqlc-dev/setup-sqlc@v4 
        with: 
          sqlc-version: '1.31.1'
      - name: Regenerate from SQL 
        run: sqlc generate 
      - name: Fail if generated code is stale 
        run: git diff --exit-code

  deploy: 
    needs: [build-test, sqlc-drift] 
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./go.sum 
      - name: Build static binary 
        working-directory: . 
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o sis ./cmd/server 
      - name: Ship 
        env: 
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }} 
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: | 
          install -m600 /dev/stdin key <<< "$SSH_KEY"
          ssh-keyscan -H "$SSH_HOST" >> known_hosts 2>/dev/null 
          REL="sis-${GITHUB_SHA::7}"
          SSHOPTS="-i key -o UserKnownHostsFile=known_hosts"
          scp $SSHOPTS ./sis "$SSH_USER@$SSH_HOST:/opt/sis/releases/$REL"
          ssh $SSHOPTS "$SSH_USER@$SSH_HOST" "sudo /opt/sis/deploy.sh $REL" 
