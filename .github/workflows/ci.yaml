name: CI 

on: 
  push: 
    branches: [main]
  pull_request: 

jobs:
  build-test:
    runs-on: ubuntu-latest 
    defaults:
      run:
        working-directory: . 
    steps: 
      - uses: actions/checkout@v4 
      
      - uses: actions/setup-go@v5 
        with: 
          go-version: '1.26'
          cache-dependency-path: ./go.sum 

      - name: Check formatting 
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run gofmt -w ."; exit 1; }

      - name: Vet 
        run: go vet ./...

      - name: Test (race detector + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build 
        run: go build ./... 

  sqlc-drift: 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4 
      - uses: sqlc-dev/setup-sqlc@v4 
        with: 
          sqlc-version: '1.31.1'
      - name: Regenerate from SQL 
        run: sqlc generate 
      - name: Fail if generated code is stale 
        run: git diff --exit-code
